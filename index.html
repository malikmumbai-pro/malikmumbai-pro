<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Cricket Tips</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1e3a3a 0%, #0a0f0f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* Mobile view fix */
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ipl-logo {
            width: 130px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #00ffcc, #33cc33);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a0f0f;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 14px;
            color: #ccc;
            margin: 0 0 30px 0;
            line-height: 1.4;
        }

        .btn {
            display: block;
            background: linear-gradient(90deg, #44cc44, #22aa22);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 17px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(50, 200, 50, 0.4);
            background: linear-gradient(90deg, #4ed94e, #28b828);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .disclaimer {
            font-size: 10.5px;
            color: #999;
            line-height: 1.5;
            padding: 0 10px;
        }

        .disclaimer b {
            color: #bbb;
        }

        /* Small mobile screens */
        @media (max-height: 600px) {
            .card { padding: 20px 15px; }
            .ipl-logo { width: 110px; margin-bottom: 15px; }
            .profile-img-container { width: 90px; height: 90px; }
            h1 { font-size: 20px; }
            p { margin-bottom: 20px; }
            .btn { padding: 12px; font-size: 16px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.ibb.co/v4999v7/ipl-logo.png" alt="IPL" class="ipl-logo">

        <div class="profile-img-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0Nbe-B38_hG-y27WcskE1YV_R6uT7Lq9sPw&s" alt="Trophy">
        </div>

        <h1>Malik Mumbai Pro</h1>
        <p>Join Now &amp; Get Winning Teams Daily 🔥</p>

        <a href="https://telegram.me/+OFkqhPodJVY2Yzg1" class="btn">JOIN TELEGRAM</a>

        <div class="disclaimer">
            <b>Disclaimer:</b> This channel shares cricket updates, analysis, and general information.
        </div>
    </div>

</body>
</html> 
</body>
</html>
