<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malik Mumbai Pro - Cricket Tips</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle, #1a2e2e 0%, #050a0a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 20px;
            width: 88%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        /* Round Image Section (Ab isme IPL Logo hai) */
        .profile-img-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: contain; /* Isse logo katega nahi */
            background: white; /* Logo ke piche white background achha lagega */
        }

        h1 {
            font-size: 30px;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #d1d1d1;
            margin-bottom: 35px;
        }

        /* Telegram Button */
        .btn {
            display: block;
            background: linear-gradient(90deg, #00c853, #64dd17);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(0, 200, 83, 0.4);
            transition: 0.3s ease;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 200, 83, 0.6);
        }

        .disclaimer {
            font-size: 11px;
            color: #777;
            line-height: 1.5;
            padding: 0 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" alt="IPL Logo">
        </div>

        <h1>Malik Mumbai Pro</h1>
        <p>Join Now &amp; Get Winning Teams Daily 🔥</p>

        <a href="https://telegram.me/+OFkqhPodJVY2Yzg1" class="btn">JOIN TELEGRAM</a>

        <div class="disclaimer">
            Disclaimer: This channel shares cricket updates, analysis, and general information.
        </div>
    </div>

</body>
</html>
